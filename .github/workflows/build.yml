name: Build NixOS WSL images

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: ubuntu-24.04-arm64
            config: aarch64
          - arch: x86_64
            runner: ubuntu-24.04
            config: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build tarball
        run: sudo nix run .#nixosConfigurations.${{ matrix.config }}.config.system.build.tarballBuilder -- nixos-${{ matrix.arch }}.wsl

      - uses: actions/upload-artifact@v4
        with:
          name: nixos-${{ matrix.arch }}.wsl
          path: nixos-${{ matrix.arch }}.wsl

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: "**/*.wsl"
